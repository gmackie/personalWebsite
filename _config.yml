#
###################################
# Shared base config
# Each site overrides with: jekyll build --config _config.yml,_config.{site}.yml
####################################
#

#
###################################
# Jekyll configuration
####################################
#
timezone:          America/Los_Angeles
markdown:          kramdown
highlighter:       rouge
excerpt_separator: <!--more-->
permalink:         /articles/:year-:month/:title

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: false

plugins:
  - jekyll-feed

# Ship dot-prefixed well-known paths (e.g. /.well-known/forge-health)
# and Cloudflare Pages' _headers rule file, which Jekyll would otherwise
# skip for starting with '.' or '_'.
include:
  - .well-known
  - _headers

collections:
  ventures:
    output: true
    permalink: /ventures/:name/

#
###################################
# Site Owner (shared across all sites)
####################################
#
