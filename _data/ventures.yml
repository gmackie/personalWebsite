- name: ForgeGraf
  slug: forgegraph
  domain: forgegraf.com
  url: https://forgegraf.com
  description: Edge + bare metal delivery platform. Deploy Workers to Cloudflare and Nix closures to Hetzner from one pipeline. Built on Jujutsu's changeset identity model with full delivery evidence, promotion gates, and health monitoring across edge and metal.
  thesis: Deploying everywhere shouldn't mean managing everything.
  status: active
  category: infrastructure
  tags: [infrastructure, graph, deployment, nix, jujutsu]
  shared_infra: []
  last_updated: 2026-03-28
  next_milestone: Multi-node fleet management
