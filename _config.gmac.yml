#
###################################
# gmac.io — Site-specific config
# Build: jekyll build --config _config.yml,_config.gmac.yml
####################################
#
title: gmac.io
url: https://gmac.io
site_id: gmac
site_theme: dashboard
description: "Prototype dashboard. Experiments running on Hetzner VPSs and local homelab."
keywords: ["Prototypes", "Experiments", "Dashboard"]
public_feed_manifest_url: https://data.gmac.io/forgegraph/v1/manifest.json

exclude:
  - index.html
  - blog.html
  - resume.html
  - pages/gmacko
  - pages/personal
  - _ventures

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      site: gmac
  - scope:
      path: "pages/gmac"
    values:
      layout: dashboard
